<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado UFRN — Custos e Fome de Poder</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #08101f;
            --surface: #121b2e;
            --surface2: #172438;
            --surface3: #1e2d43;
            --border: #2e4f77;
            --accent: #ff8bc6;
            /* Rosa choque para o simulado final */
            --danger: #ff7c74;
            --success: #7adca7;
            --text: #ecf3ff;
            --text2: #acc4dd;
            --text3: #6b85a1;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ─── BACKGROUND NOISE ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* ─── HERO ─── */
        .hero {
            position: relative;
            padding: 60px 24px 40px;
            text-align: center;
        }

        .hero-eyebrow {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        .hero h1 em {
            font-style: italic;
            color: var(--accent);
        }

        /* ─── MAIN CONTENT ─── */
        .main {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 20px 100px;
            position: relative;
            z-index: 10;
        }

        /* ─── QUIZ STYLES ─── */
        .quiz-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .quiz-score-badge {
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            padding: 6px 14px;
            border-radius: 24px;
            background: var(--surface3);
            color: var(--text2);
        }

        .progress-bar-container {
            height: 4px;
            background: var(--surface3);
            border-radius: 2px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);
            transition: width 0.4s ease;
        }

        .question-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.4s ease;
        }

        .q-num {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--text3);
            margin-bottom: 16px;
            letter-spacing: 1.5px;
        }

        .q-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.6;
            color: var(--text);
            margin-bottom: 28px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 16px 20px;
            border-radius: 16px;
            border: 1.5px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            color: var(--text2);
            line-height: 1.5;
            background: transparent;
            text-align: left;
            font-family: 'DM Sans', sans-serif;
            width: 100%;
        }

        .option:hover:not(:disabled) {
            border-color: var(--text3);
            background: var(--surface2);
            color: var(--text);
        }

        .option .opt-letter {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            min-width: 28px;
            height: 28px;
            border-radius: 8px;
            background: var(--surface3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text3);
            flex-shrink: 0;
        }

        /* Status das Respostas */
        .option.correct {
            border-color: var(--success);
            background: rgba(122, 220, 167, 0.08);
            color: #a3d9b1;
        }

        .option.correct .opt-letter {
            background: var(--success);
            color: #000;
        }

        .option.wrong {
            border-color: var(--danger);
            background: rgba(255, 124, 116, 0.08);
            color: #ffb3ae;
        }

        .option.wrong .opt-letter {
            background: var(--danger);
            color: #000;
        }

        .option:disabled {
            cursor: default;
        }

        .explanation {
            margin-top: 24px;
            padding: 18px 24px;
            background: var(--surface2);
            border-radius: 12px;
            border-left: 4px solid var(--accent);
            font-size: 0.9rem;
            color: var(--text2);
            line-height: 1.7;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .explanation.show {
            display: block;
        }

        .explanation strong {
            color: var(--text);
        }

        .quiz-nav {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 24px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: 1.5px solid var(--accent);
            background: var(--accent);
            color: #000;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
            box-shadow: 0 4px 15px rgba(255, 139, 198, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 139, 198, 0.4);
        }

        /* ─── RESULTADO FINAL ─── */
        .result-card {
            text-align: center;
            padding: 60px 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease;
        }

        .result-score {
            font-family: 'Playfair Display', serif;
            font-size: 6rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 12px;
        }

        .result-label {
            font-size: 1rem;
            color: var(--text2);
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .result-msg {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text);
            margin-bottom: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .hero h1 {
                font-size: 2.2rem;
            }

            .question-card {
                padding: 24px 20px;
            }

            .option {
                padding: 14px 16px;
                gap: 12px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>

    <div class="hero">
        <div class="hero-eyebrow">Preparatório Final — Prova 16/04</div>
        <h1>Simulado <em>UFRN</em></h1>
    </div>

    <div class="main" id="app-container">
    </div>

    <script>
        // ════════════════════════════════════════
        // DADOS DO SIMULADO (14 Questões)
        // ════════════════════════════════════════
        const QUESTIONS = [
            {
                q: "A IFRS 18 introduz categorias rigorosas para classificação na Demonstração do Resultado do Exercício. Considerando o impacto gerencial dessas normas e a granularidade do sistema de custeio, assinale a alternativa correta:",
                opts: [
                    "A) A granularidade do sistema gerencial deve ser sempre maximizada para atender estritamente aos novos relatórios da IFRS 18, ignorando a relação de custos operacionais do sistema.",
                    "B) A IFRS 18 padroniza a DRE em cinco categorias principais, enquanto a definição da granularidade interna para gestão de custos deve respeitar o equilíbrio estrito da relação Custo versus Benefício.",
                    "C) Entidades intermediárias de custeio representam o destino final e obrigatório das alocações da IFRS 18 voltadas ao mercado de capitais.",
                    "D) A perspectiva da contabilidade gerencial atua de forma subordinada à perspectiva tributária, adotando os mesmos parâmetros rígidos de classificação."
                ],
                correct: 1,
                exp: "A norma estrutura a DRE (Operacional, Investimento, Financiamento, Tributos, Descontinuadas) para comparabilidade externa. Porém, na contabilidade gerencial, o nível de detalhamento (granularidade) interno depende estritamente da relação Custo x Benefício."
            },
            {
                q: "Com a transição da Era Mercantilista para a Revolução Industrial, o modo de avaliar os estoques no Balanço Patrimonial sofreu profunda alteração. O que exigiu o surgimento formal da Contabilidade de Custos nesse cenário?",
                opts: [
                    "A) A consolidação das partidas dobradas por Luca Pacioli, que exigiu que os comerciantes marítimos rateassem suas viagens em produtos.",
                    "B) A necessidade tributária de calcular o Custo das Mercadorias Vendidas (CMV) utilizando apenas os inventários inicial e final.",
                    "C) A substituição da simples compra para revenda pela necessidade de valorar internamente os fatores de produção consumidos na transformação.",
                    "D) A imposição de auditores independentes para mensurar o Dano Emergente causado pelo sucateamento das manufaturas."
                ],
                correct: 2,
                exp: "A conta 'Compras' da era comercial perdeu sentido. A indústria passou a fabricar, precisando mensurar e ativar no estoque os pilares do custo: Materiais Diretos, Mão de Obra e Custos Indiretos."
            },
            {
                q: "Analise o fluxo contábil temporal e espacial da aquisição de uma grande remessa de matéria-prima até a venda final do produto acabado. Qual a sequência técnica correta de transição?",
                opts: [
                    "A) Desembolso, seguido de Despesa, convertendo-se em Custo e encerrando-se como Perda.",
                    "B) Gasto, seguido de Investimento no almoxarifado, transformando-se em Custo na fábrica e baixado como Despesa na venda.",
                    "C) Gasto, seguido imediatamente de Custo, estocado como Investimento final e resultando no Desembolso.",
                    "D) Investimento inicial, gerando um Gasto na produção, baixado como Despesa e finalizando como Custo irrecuperável."
                ],
                correct: 1,
                exp: "O sacrifício financeiro original é o Gasto. Ao entrar no almoxarifado vira Investimento (Ativo). Ao ser requisitado pela fábrica vira Custo de Produção (Ativo). Ao ser vendido, afeta o resultado como Despesa (CPV)."
            },
            {
                q: "Durante a produção de mesas, uma quantidade previsível de serragem é gerada no corte. Na semana seguinte, uma pane elétrica externa paralisa a fábrica, causando ociosidade da mão de obra. Na teoria de custos, como esses consumos são classificados, respectivamente?",
                opts: [
                    "A) Como Despesa de Produção e Perda Patrimonial.",
                    "B) Como Perda Anormal e Despesa Extraordinária.",
                    "C) Como Custo de Produção e Perda.",
                    "D) Como Custo Indireto e Custo Direto da Ociosidade."
                ],
                correct: 2,
                exp: "A serragem é uma perda normal (inerente e intencional do processo), logo compõe o Custo de Produção. A pane elétrica é um evento anormal, involuntário e externo, sendo lançada diretamente na DRE como Perda."
            },
            {
                q: "O Princípio do Custo Histórico é a base de registro de ativos, mas em economias com alto índice inflacionário sua aplicação sem correção gera uma distorção perigosa. Assinale a consequência direta dessa manutenção rígida:",
                opts: [
                    "A) Subavaliação do lucro bruto, prejudicando os repasses de dividendos aos acionistas minoritários.",
                    "B) Confrontação de um CPV superavaliado com receitas de poder aquisitivo baixo.",
                    "C) Surgimento de lucros operacionais ilusórios, pois confronta-se uma receita em moeda atualizada com um custo consumido em moeda defasada.",
                    "D) Aumento drástico da Margem de Contribuição, blindando a empresa de despesas operacionais."
                ],
                correct: 2,
                exp: "Ao vender hoje (preço alto inflacionado) um produto feito meses atrás (custo histórico baixo sem correção), a diferença cria um 'Lucro Ilusório' gigantesco, tributando a empresa sobre um ganho irreal."
            },
            {
                q: "A regra oficial e conservadora para a valoração dos estoques no encerramento do Balanço Patrimonial determina que o estoque deve figurar pelo:",
                opts: [
                    "A) Valor Realizável Líquido em todas as circunstâncias, ajustando sempre para valor de mercado.",
                    "B) Custo de Aquisição ou Valor Realizável Líquido, devendo prevalecer dos dois o menor.",
                    "C) Custo Histórico somado à correção integral do Imposto de Renda.",
                    "D) Custo de Reposição ou Margem de Contribuição, prevalecendo o maior."
                ],
                correct: 1,
                exp: "Essa é a aplicação prática da Convenção da Prudência. Se o preço estimado de venda líquido (VRL) cair abaixo do custo de fabricação/aquisição, o contador deve assumir a perda e registrar o menor valor."
            },
            {
                q: "O Princípio da Realização da Receita (alinhado à Competência) estabelece o momento em que a contabilidade diverge da visão econômica pura. O lucro, na contabilidade oficial, apenas é reconhecido:",
                opts: [
                    "A) Durante o avanço físico do processo de fabricação (agregação de valor).",
                    "B) No momento da venda (transferência de riscos/benefícios para terceiros), independente do fluxo de caixa.",
                    "C) Na compensação efetiva do recebimento na conta bancária.",
                    "D) Após a entrega física no almoxarifado de Produtos Acabados."
                ],
                correct: 1,
                exp: "Para a Contabilidade, o lucro não é gerado na prateleira da fábrica. Ele exige o momento de realização (venda/transferência), ocasião em que as despesas são confrontadas (Competência)."
            },
            {
                q: "O tratamento contábil obrigatório para as operações de arrendamento mercantil financeiro (Leasing) é um exemplo clássico de que princípio/convenção?",
                opts: [
                    "A) Princípio da Realização da Receita.",
                    "B) Prevalência da Essência Econômica sobre a Forma Jurídica.",
                    "C) Convenção da Consistência.",
                    "D) Convenção da Materialidade."
                ],
                correct: 1,
                exp: "A 'forma jurídica' do Leasing é um aluguel, mas a 'essência econômica' é a de uma compra financiada (a empresa detém os riscos e benefícios do bem). A Contabilidade exige contabilizar a essência (Ativo + Passivo)."
            },
            {
                q: "O Custeio por Absorção é o método exigido pela Legislação Fiscal Brasileira. Sua premissa central exige que:",
                opts: [
                    "A) Absolutamente todos os custos relativos ao esforço fabril (fixos/variáveis, diretos/indiretos) sejam alocados aos estoques produzidos, jamais estocando despesas.",
                    "B) O produto absorva proporcionalmente as despesas financeiras caso o dinheiro tenha sido levantado para comprar matéria-prima.",
                    "C) Somente a parcela variável dos fatores de produção acompanhe o produto, isolando os fixos na DRE.",
                    "D) As despesas com pesquisa e publicidade sejam retidas no Ativo da Ordem de Produção."
                ],
                correct: 0,
                exp: "Regra de Ouro do Absorção: Tudo o que é gasto da porta da fábrica para dentro (Custo) vai para o produto. Tudo o que é escritório/vendas/financeiro (Despesa) vai direto para a DRE."
            },
            {
                q: "Para evitar um rateio excessivamente arbitrário e irreal, caso o gasto com honorários da Diretoria Global precise ser rateado, a contabilidade utiliza a restrição da prudência para:",
                opts: [
                    "A) Apropriar a maior parte aos produtos em elaboração para resguardar a margem bruta global.",
                    "B) Aplicar o método ABC ignorando as restrições hierárquicas.",
                    "C) Lançar todo o valor questionável integralmente como Despesa, evitando a retenção do gasto fictício no Ativo.",
                    "D) Repassar os honorários inteiramente como Perda Anormal Operacional."
                ],
                correct: 2,
                exp: "Na dúvida entre jogar a carga para o resultado do mês (Despesa) ou ativar para o futuro (Custo), o conservadorismo manda reconhecer a Despesa imediatamente, impedindo a superavaliação ilusória dos estoques."
            },
            {
                q: "Ao utilizar o método do Custeio Variável em relatórios internos, o gestor exclui a carga fixa do custo dos produtos fabricados. Essa divisão tem como finalidade apurar de imediato:",
                opts: [
                    "A) A viabilidade dos estoques pelo método BR GAAP antes da publicação obrigatória.",
                    "B) A Margem de Contribuição, evidenciando o quanto cada unidade vendida gera de ganho livre para quitar os Custos Fixos em busca do lucro.",
                    "C) O Custo de Reposição alinhado à Convenção da Materialidade.",
                    "D) A taxa de retorno (ROI) exigida pelos auditores independentes."
                ],
                correct: 1,
                exp: "A Margem de Contribuição (Receita - Gastos Variáveis) é o coração da gestão interna de preços. Ela responde o quanto sobra da venda do produto para ajudar a pagar a estrutura fixa da empresa."
            },
            {
                q: "Uma vez que o Custo de Produção encerra-se quando a mercadoria final está pronta, qual a classificação aplicável a embalagens de manuseio externo e displays expositores encomendados para entregar nos revendedores parceiros?",
                opts: [
                    "A) Integram normalmente os Custos Indiretos de Fabricação da OP.",
                    "B) Representam Perdas Normais na logística promocional.",
                    "C) Constituem Despesas Comerciais e de Vendas, indo integralmente à DRE.",
                    "D) Tornam-se Investimentos Intangíveis."
                ],
                correct: 2,
                exp: "O limite técnico do custo é a fábrica. Esforços logísticos, de distribuição e exposição em ponto de venda ocorrem após a produção e objetivam gerar receita, classificando-se como Despesas de Vendas."
            },
            {
                q: "No filme Fome de Poder (The Founder), a inovação do 'Speedee Service System' desenhou rigorosamente uma nova cozinha. Traduzindo isso para a contabilidade de custos, o que essa coreografia buscou eliminar?",
                opts: [
                    "A) A imposição legal de usar o Custeio Baseado em Atividades na Califórnia.",
                    "B) A Margem de Contribuição dos lanches e o retorno sobre o investimento imobiliário.",
                    "C) O 'custo inimigo' e os desperdícios gerados pela ociosidade, maximizando a eficiência da Mão de Obra para diluir os CIFs em altíssimo volume.",
                    "D) A aplicação do Princípio da Competência sobre perdas anormais de pão."
                ],
                correct: 2,
                exp: "Tempo é dinheiro (literalmente MOD ociosa). A eliminação de passos em falso e cruzamentos na cozinha visava extirpar gargalos, permitindo produzir muito mais unidades no mesmo espaço de tempo, diluindo os custos fixos."
            },
            {
                q: "A maior guinada em Fome de Poder ocorre quando Harry Sonneborn muda o foco: 'Você não está no negócio de hambúrgueres'. Como a fundação da Franchise Realty Corp solucionou a fragilidade financeira da operação por uma visão patrimonial?",
                opts: [
                    "A) A empresa passou a dominar os fornecedores ativando passivos ocultos.",
                    "B) Evitou o rateio forçado pelo Custeio Variável que Kroc pagava à vista.",
                    "C) Substituiu um modelo dependente de margens ilusórias de frações de lanches por Ativos Imobilizados tangíveis e receitas previsíveis de arrendamento de terrenos.",
                    "D) Permitiu apurar Custos Históricos isentos de inflação retroativa nas cozinhas."
                ],
                correct: 2,
                exp: "Kroc tinha problemas de fluxo de caixa porque dependia de uma ínfima porcentagem sobre lanches (difícil controle). Comprar os terrenos e arrendá-los aos franqueados criou um Ativo Imobilizado poderoso, dando garantia para empréstimos bancários e fluxo de caixa certo."
            }
        ];

        // ════════════════════════════════════════
        // ESTADO DO APLICATIVO
        // ════════════════════════════════════════
        let currentQuestion = 0;
        let score = 0;
        let hasAnsweredCurrent = false;

        const container = document.getElementById('app-container');

        function renderQuestion() {
            if (currentQuestion >= QUESTIONS.length) {
                renderResult();
                return;
            }

            const q = QUESTIONS[currentQuestion];
            const letters = ['A', 'B', 'C', 'D'];
            const progressPct = ((currentQuestion) / QUESTIONS.length) * 100;

            let html = `
                <div class="quiz-header">
                    <span class="q-num">QUESTÃO ${String(currentQuestion + 1).padStart(2, '0')} DE 14</span>
                    <span class="quiz-score-badge">Acertos: ${score}</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" style="width: ${progressPct}%"></div>
                </div>

                <div class="question-card">
                    <div class="q-text">${q.q}</div>
                    <div class="options" id="options-container">
                        ${q.opts.map((opt, i) => `
                            <button class="option" id="opt-${i}" onclick="selectAnswer(${i})">
                                <span class="opt-letter">${letters[i]}</span>
                                <span>${opt.substring(3)}</span>
                            </button>
                        `).join('')}
                    </div>
                    <div class="explanation" id="explanation">
                        <strong>🎯 Resolução:</strong> <span id="exp-text"></span>
                    </div>
                    <div class="quiz-nav">
                        <button class="btn" id="next-btn" style="display: none;" onclick="nextQuestion()">Próxima Questão →</button>
                    </div>
                </div>
            `;
            container.innerHTML = html;
            hasAnsweredCurrent = false;
        }

        window.selectAnswer = function (index) {
            if (hasAnsweredCurrent) return;
            hasAnsweredCurrent = true;

            const q = QUESTIONS[currentQuestion];
            const buttons = document.querySelectorAll('.option');
            const explanation = document.getElementById('explanation');
            const expText = document.getElementById('exp-text');
            const nextBtn = document.getElementById('next-btn');

            // Desabilita botões
            buttons.forEach(btn => btn.disabled = true);

            // Verifica acerto
            if (index === q.correct) {
                document.getElementById(`opt-${index}`).classList.add('correct');
                score++;
                document.querySelector('.quiz-score-badge').textContent = `Acertos: ${score}`;
            } else {
                document.getElementById(`opt-${index}`).classList.add('wrong');
                document.getElementById(`opt-${q.correct}`).classList.add('correct');
            }

            // Mostra explicação
            expText.textContent = q.exp;
            explanation.classList.add('show');

            // Ajusta botão
            if (currentQuestion === QUESTIONS.length - 1) {
                nextBtn.textContent = "Ver Resultado Final ✓";
            }
            nextBtn.style.display = 'block';
        }

        window.nextQuestion = function () {
            currentQuestion++;
            renderQuestion();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderResult() {
            const pct = Math.round((score / QUESTIONS.length) * 100);
            let msg, color;

            if (pct >= 85) {
                msg = "Excepcional! Você tem pleno domínio da Teoria Contábil, métodos de custeio e pegadinhas da banca. Vai amassar a prova do dia 16!";
                color = "var(--success)";
            } else if (pct >= 70) {
                msg = "Ótimo resultado! Seu conhecimento dos pilares de custos está sólido. Revise apenas os pequenos detalhes sobre Custo Histórico e VRL.";
                color = "var(--accent)";
            } else {
                msg = "Continue treinando! Faltou pouco. Aproveite essas 48 horas até a prova para reler os resumos de Custo por Absorção e a Regra Espacial.";
                color = "var(--danger)";
            }

            container.innerHTML = `
                <div class="result-card">
                    <div class="result-score" style="color: ${color}">${score}/14</div>
                    <div class="result-label">APROVEITAMENTO DE ${pct}%</div>
                    <div class="result-msg">${msg}</div>
                    <button class="btn" onclick="restartQuiz()">Refazer Simulado ↺</button>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.restartQuiz = function () {
            currentQuestion = 0;
            score = 0;
            renderQuestion();
        }

        // Inicia o Simulado
        renderQuestion();
    </script>
</body>

</html>
